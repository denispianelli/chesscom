name: publish

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write # required for npm provenance / OIDC trusted publishing

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      # npm >= 11.5.1 is required for OIDC trusted publishing.
      - run: npm install -g npm@latest
      - run: npm ci
      # prepublishOnly runs check + build; --provenance attests the build.
      - run: npm publish --provenance --access public
